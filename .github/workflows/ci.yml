name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Set up Java (Firestore emulator runtime)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Run Firestore rules regression suite
        run: npm run test:rules

      - name: Build app
        run: npm run build

      # Operational smoke + calibration reports. Offline/deterministic — no
      # Firestore, no Gemini, no private scenario files. qa:calibrate:check is
      # deliberately NOT run here: it correctly exits 1 (INSUFFICIENT_DATA)
      # until real human calibration evidence exists.
      - name: Call QA pilot smoke (OB/GYN rollout scope)
        run: npm run qa:pilot-smoke

      - name: Call QA calibration report (offline)
        run: npm run qa:calibrate

      - name: Call QA coverage report (offline)
        run: npm run qa:coverage
