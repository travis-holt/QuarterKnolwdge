name: OB/GYN v3 targeted diagnostic

on:
  push:
    branches:
      - feature/obgyn-current-floor-assessment-bank-v3
    paths:
      - '.github/workflows/obgyn-v3-diagnostic.yml'
      - 'src/data/audits-obgyn-current-floor-v3.js'
      - 'src/data/audits-obgyn-current-floor-v3.test.js'
      - 'src/data/questions-obgyn-current-floor-v3.test.js'

permissions:
  contents: read

jobs:
  targeted:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/obgyn-current-floor-assessment-bank-v3
      - uses: actions/setup-node@v4
        with:
          node-version: 20.19.0
          cache: npm
      - run: npm ci
      - run: npm test -- src/data/questions-obgyn-current-floor-v3.test.js src/data/audits-obgyn-current-floor-v3.test.js src/lib/obgynCurrentFloorBankMigration.test.js
