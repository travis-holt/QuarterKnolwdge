name: OB/GYN v3 flag diagnostic

on:
  push:
    branches:
      - feature/obgyn-current-floor-assessment-bank-v3
    paths:
      - '.github/workflows/obgyn-v3-flag-diagnostic.yml'

permissions:
  contents: write

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/obgyn-current-floor-assessment-bank-v3
      - name: Write content-guard diagnostics
        run: |
          node --input-type=module <<'NODE' > obgyn-v3-flag-diagnostic.json
          import { OBGYN_CURRENT_FLOOR_AUDITS } from './src/data/audits-obgyn-current-floor-v3.js';
          import { validateAuditContent } from './src/lib/contentGuards.js';
          const result = OBGYN_CURRENT_FLOOR_AUDITS
            .map((audit) => ({ id: audit.id, flags: validateAuditContent(audit) }))
            .filter((entry) => entry.flags.length > 0);
          console.log(JSON.stringify(result, null, 2));
          NODE
      - name: Commit diagnostics
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add obgyn-v3-flag-diagnostic.json
          git commit -m "Add temporary OB/GYN guard diagnostics"
          git push origin HEAD:feature/obgyn-current-floor-assessment-bank-v3
