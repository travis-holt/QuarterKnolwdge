name: Apply OB/GYN current-floor bank v3

on:
  push:
    branches:
      - feature/obgyn-current-floor-assessment-bank-v3
    paths:
      - '.github/workflows/apply-obgyn-current-floor-bank-v3.yml'
      - 'scripts/apply-obgyn-current-floor-bank-v3.py'
  pull_request:
    branches:
      - main
    types: [opened, synchronize, reopened]

permissions:
  contents: write

concurrency:
  group: apply-obgyn-current-floor-bank-v3
  cancel-in-progress: false

jobs:
  apply-test-commit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: feature/obgyn-current-floor-assessment-bank-v3
      - uses: actions/setup-node@v4
        with:
          node-version: 20.19.0
          cache: npm
      - run: npm ci
      - name: Apply integration and documentation patches
        run: python scripts/apply-obgyn-current-floor-bank-v3.py
      - name: Targeted current-floor bank tests
        run: npm test -- src/data/questions-obgyn-current-floor-v3.test.js src/data/audits-obgyn-current-floor-v3.test.js src/lib/obgynCurrentFloorBankMigration.test.js
      - name: Full unit suite
        run: npm test
      - name: Production build
        run: npm run build
      - name: Diff integrity
        run: git diff --check
      - name: Commit tested integration
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Integrate current-floor OB/GYN assessment bank v3"
          git push origin HEAD:feature/obgyn-current-floor-assessment-bank-v3
